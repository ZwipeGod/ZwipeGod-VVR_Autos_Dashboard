<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVR Autos Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body class="bg-gray-100 font-sans">


<div class="max-w-7xl mx-auto p-6">


    <!-- Header -->

    <header class="flex justify-between items-center border-b pb-5 mb-8">

        <div>
            <h1 class="text-3xl font-bold text-gray-800">
                🚗 VVR Autos Hub
            </h1>

            <p class="text-gray-500 mt-1">
                Live Inventory Management System
            </p>
        </div>


        <div class="text-green-600 font-semibold">
            🟢 Connected
        </div>

    </header>



    <!-- Dashboard Cards -->

    <div class="grid md:grid-cols-3 gap-5 mb-8">


        <div class="bg-white rounded-xl shadow p-6 flex items-center">

            <div class="bg-blue-600 text-white p-3 rounded-lg text-xl">
                📦
            </div>

            <div class="ml-4">

                <p class="text-gray-500">
                    Total Stock
                </p>

                <h2 id="stat-stock"
                    class="text-3xl font-bold">
                    0
                </h2>

            </div>

        </div>



        <div class="bg-white rounded-xl shadow p-6 flex items-center">


            <div class="bg-yellow-500 text-white p-3 rounded-lg text-xl">
                📋
            </div>


            <div class="ml-4">

                <p class="text-gray-500">
                    Total Bookings
                </p>


                <h2 id="stat-booking"
                    class="text-3xl font-bold">
                    0
                </h2>

            </div>


        </div>




        <div class="bg-white rounded-xl shadow p-6 flex items-center">


            <div class="bg-green-600 text-white p-3 rounded-lg text-xl">
                💰
            </div>


            <div class="ml-4">

                <p class="text-gray-500">
                    Total Payments
                </p>


                <h2 id="stat-payment"
                    class="text-3xl font-bold">
                    0
                </h2>


            </div>

        </div>


    </div>



    <!-- Chart + Table -->

    <div class="grid lg:grid-cols-2 gap-6">


        <!-- Chart -->

        <div class="bg-white rounded-xl shadow p-6">


            <h2 class="font-bold text-xl">
                Branch Analytics
            </h2>


            <div class="h-80 mt-5">

                <canvas id="chart"></canvas>

            </div>


        </div>



        <!-- Table -->


        <div class="bg-white rounded-xl shadow">


            <div class="p-5 border-b">


                <h2 class="text-xl font-bold">
                    Branch Data
                </h2>


                <input
                    id="search"
                    type="text"
                    placeholder="Search Branch..."
                    oninput="filterTable()"
                    class="mt-3 w-full p-2 border rounded">


            </div>



            <div class="max-h-[400px] overflow-y-auto">


                <table class="w-full text-left">


                    <thead class="bg-gray-100 sticky top-0">


                        <tr>

                            <th class="p-3">
                                Branch
                            </th>


                            <th class="p-3">
                                Stock
                            </th>


                            <th class="p-3">
                                Booking
                            </th>


                            <th class="p-3">
                                Payment
                            </th>


                            <th class="p-3">
                                Action
                            </th>


                        </tr>


                    </thead>



                    <tbody id="table-body">


                    </tbody>


                </table>


            </div>


        </div>


    </div>


</div>



<!-- EDIT POPUP -->

<div id="popup"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">


    <div class="bg-white rounded-xl p-6 w-80">


        <h2 class="text-xl font-bold mb-4">
            Edit Branch
        </h2>


        <p id="edit-branch"
           class="mb-3 text-gray-600">
        </p>



        <input id="edit-stock"
               type="number"
               placeholder="Stock"
               class="border p-2 rounded w-full mb-3">


        <input id="edit-booking"
               type="number"
               placeholder="Booking"
               class="border p-2 rounded w-full mb-3">


        <input id="edit-payment"
               type="number"
               placeholder="Payment"
               class="border p-2 rounded w-full mb-4">



        <div class="flex justify-end gap-2">


            <button onclick="closePopup()"
                class="bg-gray-500 text-white px-4 py-2 rounded">

                Cancel

            </button>



            <button onclick="saveChanges()"
                class="bg-green-600 text-white px-4 py-2 rounded">

                Save

            </button>


        </div>


    </div>


</div>


<script>
    // ======================================
// GOOGLE SHEETS CONFIGURATION
// ======================================

const API_KEY =
"AIzaSyBRaKHk8iTEf09tQqo6eixAOEdiFusTToA";


const SPREADSHEET_ID =
"1ZawvGDZfqdH2K1A_gr1GkYbYmtrM97ingWGKftkus0w";


const RANGE = "Live Stock!A:D";


// ======================================
// APPS SCRIPT UPDATE API
// ======================================

const UPDATE_API =
"https://script.google.com/macros/s/AKfycbwhLsuGJcBjszFbvQbMWbDj8anAVLf6MRlHdNXQFJNPuncOcCu3KEiwvDpi9wbxgZRHzA/exec";


// ======================================
// GLOBAL VARIABLES
// ======================================

let branchData = [];

let chartInstance = null;

let currentBranch = "";



// ======================================
// LOAD DATA AUTOMATICALLY
// ======================================

window.addEventListener("load", () => {

    loadSheetData();

});



// ======================================
// GET DATA FROM GOOGLE SHEETS
// ======================================

async function loadSheetData() {


    const url =
    `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;


    try {


        const response = await fetch(url);


        const result = await response.json();


        console.log("Sheet Data:", result);



        if(result.values) {


            processData(result.values);


        } else {


            console.error("No data found", result);


        }


    } catch(error) {


        console.error(
            "Connection failed:",
            error
        );


    }


}



// ======================================
// PROCESS LIVE STOCK DATA
// ======================================


function processData(rows) {


    branchData = [];


    let totalStock = 0;

    let totalBooking = 0;

    let totalPayment = 0;



    // Skip headings

    for(let i = 1; i < rows.length; i++) {


        const row = rows[i];


        const branch =
        String(row[0] || "")
        .trim();



        // Ignore empty rows
        // Ignore old totals rows

        if(
            branch === "" ||
            branch.toLowerCase() === "totals"
        ) {

            continue;

        }



        const stock =
        parseInt(row[1]) || 0;


        const booking =
        parseInt(row[2]) || 0;


        const payment =
        parseInt(row[3]) || 0;



        totalStock += stock;

        totalBooking += booking;

        totalPayment += payment;



        branchData.push({

            branch: branch,

            stock: stock,

            booking: booking,

            payment: payment

        });


    }



    // Update dashboard cards


    document.getElementById("stat-stock")
    .innerText =
    totalStock.toLocaleString();



    document.getElementById("stat-booking")
    .innerText =
    totalBooking.toLocaleString();



    document.getElementById("stat-payment")
    .innerText =
    totalPayment.toLocaleString();



    // Update UI


    renderTable(branchData);

    renderChart(branchData);


}
    // ======================================
// RENDER TABLE
// ======================================

function renderTable(data) {


    const table =
    document.getElementById("table-body");


    table.innerHTML = "";



    data.forEach(item => {


        const row =
        document.createElement("tr");


        let stockDisplay;



        // Low stock warning

        if(item.stock <= 15) {


            stockDisplay =
            `<span class="bg-red-100 text-red-600 px-2 py-1 rounded font-bold">
                ${item.stock}
            </span>`;


        } else {


            stockDisplay =
            `<span class="font-semibold">
                ${item.stock}
            </span>`;

        }



        row.innerHTML = `


            <td class="p-3 font-semibold">
                ${item.branch}
            </td>


            <td class="p-3">
                ${stockDisplay}
            </td>


            <td class="p-3">
                ${item.booking}
            </td>


            <td class="p-3">
                ${item.payment}
            </td>


            <td class="p-3">

                <button
                onclick="editBranch(
                    '${item.branch}',
                    ${item.stock},
                    ${item.booking},
                    ${item.payment}
                )"

                class="
                    bg-blue-600
                    text-white
                    px-3
                    py-1
                    rounded
                    hover:bg-blue-700
                ">

                    ✏️ Edit

                </button>

            </td>


        `;


        table.appendChild(row);


    });


}



// ======================================
// SEARCH FUNCTION
// ======================================


function filterTable() {


    const search =
    document
    .getElementById("search")
    .value
    .toLowerCase();



    const filtered =
    branchData.filter(item =>


        item.branch
        .toLowerCase()
        .includes(search)


    );



    renderTable(filtered);


}




// ======================================
// CREATE BAR CHART
// ======================================


function renderChart(data) {


    const ctx =
    document
    .getElementById("chart")
    .getContext("2d");



    // Remove old chart
    if(chartInstance) {


        chartInstance.destroy();


    }



    chartInstance = new Chart(ctx, {


        type: "bar",


        data: {


            labels:
            data.map(x => x.branch),


            datasets: [


                {

                    label: "Stock",

                    data:
                    data.map(x => x.stock),

                    backgroundColor:
                    "#2563eb"

                },


                {


                    label: "Bookings",


                    data:
                    data.map(x => x.booking),


                    backgroundColor:
                    "#f59e0b"


                },


                {


                    label: "Payments",


                    data:
                    data.map(x => x.payment),


                    backgroundColor:
                    "#16a34a"


                }


            ]


        },


        options: {


            responsive: true,


            maintainAspectRatio: false,


            plugins: {


                legend: {


                    position: "top"


                }


            },


            scales: {


                y: {


                    beginAtZero: true


                }


            }


        }


    });


}

    // ======================================
// OPEN EDIT POPUP
// ======================================

function editBranch(branch, stock, booking, payment) {


    currentBranch = branch;


    document
    .getElementById("edit-branch")
    .innerText =
    "Editing: " + branch;


    document
    .getElementById("edit-stock")
    .value =
    stock;


    document
    .getElementById("edit-booking")
    .value =
    booking;


    document
    .getElementById("edit-payment")
    .value =
    payment;


    document
    .getElementById("popup")
    .classList.remove("hidden");


}



// ======================================
// CLOSE POPUP
// ======================================


function closePopup() {


    document
    .getElementById("popup")
    .classList.add("hidden");


}



// ======================================
// SAVE CHANGES TO GOOGLE SHEETS
// ======================================


async function saveChanges() {


    const stock =
    parseInt(
        document.getElementById("edit-stock").value
    );


    const booking =
    parseInt(
        document.getElementById("edit-booking").value
    );


    const payment =
    parseInt(
        document.getElementById("edit-payment").value
    );



    const data = {


        branch: currentBranch,

        stock: stock,

        booking: booking,

        payment: payment


    };



    try {


        const response = await fetch(UPDATE_API, {


            method: "POST",


            body: JSON.stringify(data)


        });



        const result =
        await response.json();



        if(result.success) {


            alert("✅ Data updated successfully!");


            closePopup();


            // Reload latest data
            loadSheetData();


        }


        else {


            alert(
                "❌ Update failed: " +
                result.message
            );


        }



    } catch(error) {


        console.error(error);


        alert(
            "❌ Connection failed. Check console."
        );


    }


}



// ======================================
// OPTIONAL AUTO REFRESH EVERY 30 SECONDS
// ======================================


setInterval(() => {


    loadSheetData();


}, 30000);




// ======================================
// END OF JAVASCRIPT
// ======================================
</script>


</body>


</html>
